version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongoDB
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mystore

  backend:
    build: ./backend
    container_name: express-backend
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/mystore
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongo-data: